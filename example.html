<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Xkin — Tabbed Component</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
        }

        h1 {
            color: #569cd6;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #808080;
            margin-bottom: 20px;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .panel {
            display: flex;
            flex-direction: column;
        }

        .panel-label {
            font-weight: 600;
            color: #9cdcfe;
            margin-bottom: 6px;
        }

        .file-tabs {
            display: flex;
            gap: 2px;
            align-items: flex-end;
        }

        .file-tab {
            padding: 6px 14px;
            background: #2d2d2d;
            border: 1px solid #3c3c3c;
            border-bottom: none;
            color: #808080;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        .file-tab.active {
            background: #1e1e1e;
            color: #d4d4d4;
            border-color: #569cd6;
            border-bottom: 1px solid #1e1e1e;
            z-index: 1;
        }

        .file-tab.main-tab {
            color: #569cd6;
        }

        .file-tab .close {
            margin-left: 8px;
            opacity: .4;
            font-size: 12px;
        }

        .file-tab .close:hover {
            opacity: 1;
            color: #f48771;
        }

        .file-tab-add {
            padding: 6px 10px;
            background: transparent;
            border: 1px dashed #555;
            border-bottom: none;
            color: #569cd6;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            font-size: 15px;
            font-weight: bold;
        }

        .file-tab-add:hover {
            background: #2d2d2d;
        }

        .editor-wrap {
            border: 1px solid #3c3c3c;
            border-radius: 0 4px 4px 4px;
            overflow: hidden;
            height: 350px;
        }

        .editor-wrap.scss-editor {
            height: 200px;
            border-radius: 4px;
        }

        .output-box {
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            overflow: hidden;
            height: 200px;
        }

        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        button.action {
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 600;
            background: #0e639c;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button.action:hover {
            background: #1177bb;
        }

        .option-group {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .option-group label {
            font-size: 14px;
        }

        .status {
            margin-top: 6px;
            padding: 6px 8px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
            white-space: pre-wrap;
        }

        .status.success {
            display: block;
            background: #2d4a3e;
            color: #4ec9b0;
        }

        .status.error {
            display: block;
            background: #4a2d2d;
            color: #f48771;
        }

        .section-label {
            font-weight: 600;
            color: #c586c0;
            margin: 16px 0 6px;
            font-size: 13px;
            text-transform: uppercase;
        }

        .preview-frame {
            border: 1px solid #3c3c3c;
            border-radius: 4px;
            background: white;
            width: 100%;
            height: 200px;
        }
    </style>
</head>

<body>

    <h1>Tabbed Component</h1>
    <p class="subtitle">Multi-file TSX + SCSS — merged build</p>

    <div class="controls">
        <button class="action" id="btn-build">Build</button>

        <div class="option-group">
            <input type="checkbox" id="opt-compress" />
            <label for="opt-compress">Compress</label>
        </div>

        <div class="option-group">
            <input type="checkbox" id="opt-mangle" />
            <label for="opt-mangle">Mangle</label>
        </div>
    </div>

    <div class="workspace">

        <div class="panel">
            <div class="panel-label">TSX Files</div>
            <div class="file-tabs" id="tsx-tabs"></div>
            <div class="editor-wrap" id="tsx-editor"></div>

            <div class="section-label">Styles (SCSS)</div>
            <div class="editor-wrap scss-editor" id="scss-editor"></div>
        </div>

        <div class="panel">
            <div class="panel-label">JS Output</div>
            <div class="output-box" id="js-output"></div>
            <div id="js-status" class="status"></div>

            <div class="section-label">CSS Output</div>
            <div class="output-box" id="css-output"></div>

            <div class="section-label">Tokens</div>
            <div class="output-box" id="tokens-output"></div>
            <div id="css-status" class="status"></div>

        </div>

    </div>

    <script src="dist/xkin.editor.min.js"></script>
    <script src="dist/xkin.tools.min.js"></script>
    <script src="dist/xkin.styles.min.js"></script>
    <script src="dist/xkin.engine.min.js"></script>
    <script src="dist/xkin.min.js"></script>

    <script>

        function showStatus(id, msg, error = false) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = "status " + (error ? "error" : "success");
        }

        /* Types */
        Xkin.add_types([
            {
                path: "preact.d.ts",
                content: [
                    "declare function h(tag:any, props?:any, ...children:any[]):any;",
                    "declare const Fragment: unique symbol;",
                    "declare function render(el:any, root:any):void;",
                    "declare const styles: Record<string,string>;"
                ].join("\n")
            }
        ]);

        /* Files — CRUD via Xkin.files */
        Xkin.files.create("index.tsx", `import { Header } from "./header";
import { Counter } from "./counter";

const App = () => (
<div class={styles.app}>
<Header title="My App" />
<Counter start={0} />
</div>
);

render(<App />, document.getElementById("root"));`, { main: true });

        Xkin.files.create("header.tsx", `interface HeaderProps { title:string }

export const Header = ({title}:HeaderProps)=>(
<header class={styles.header}>
<h1>{title}</h1>
<p>Built with Xkin tabs</p>
</header>
);`);

        Xkin.files.create("counter.tsx", `interface CounterProps { start:number }

export const Counter = ({start}:CounterProps)=>{
let count=start;

return(
<div class={styles.card}>
<span class={styles.count}>{count}</span>
<button class={styles.button} onClick={()=>console.log(++count)}>
Increment
</button>
</div>
);
};`);

        let activeName = "index.tsx";
        let tsxEditor = null;

        /* SCSS */
        const scssEditor = Xkin.editor({
            element: document.getElementById("scss-editor"),
            language: "scss",
            value: `$primary:#569cd6;
$card-bg:#2d2d2d;
$radius:8px;

.app{max-width:600px;margin:20px auto;color:#d4d4d4;}

.header{
background:linear-gradient(135deg,$primary,darken($primary,20%));
padding:24px;
border-radius:$radius;
text-align:center;
h1{color:white;}
p{color:rgba(white,.7);}
}

.card{
background:$card-bg;
border-radius:$radius;
padding:20px;
display:flex;
gap:16px;
align-items:center;
}

.count{font-size:2rem;color:$primary;}

.button{
padding:8px 20px;
background:$primary;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
&:hover{background:lighten($primary,10%);}
}`
        });

        /* Outputs */
        const jsOutput = Xkin.editor({
            element: document.getElementById("js-output"),
            language: "javascript",
            value: "",
            read_only: true
        });

        const cssOutput = Xkin.editor({
            element: document.getElementById("css-output"),
            language: "css",
            value: "",
            read_only: true
        });

        const tokensOutput = Xkin.editor({
            element: document.getElementById("tokens-output"),
            language: "json",
            value: "",
            read_only: true
        });

        /* Tabs — driven by Xkin.files.list() */

        function renderTabs() {
            const container = document.getElementById("tsx-tabs");
            container.innerHTML = "";

            Xkin.files.list().forEach((file) => {
                const tab = document.createElement("button");
                tab.className = "file-tab"
                    + (file.name === activeName ? " active" : "")
                    + (file.main ? " main-tab" : "");

                tab.innerHTML = file.name + (file.main ? "" : `<span class="close">&times;</span>`);

                tab.addEventListener("click", (e) => {
                    if (e.target.closest(".close")) {
                        removeFile(file.name);
                        return;
                    }
                    switchTab(file.name);
                });

                container.appendChild(tab);
            });

            const addBtn = document.createElement("button");
            addBtn.className = "file-tab-add";
            addBtn.textContent = "+";
            addBtn.onclick = addFile;
            container.appendChild(addBtn);
        }

        function switchTab(name) {
            activeName = name;
            tsxEditor.setModel(Xkin.files.get(name));
            renderTabs();
        }

        function addFile() {
            const num = Xkin.files.list().length;
            const name = `file_${num}.tsx`;
            const content = `// ${name}\nexport const Component${num}=()=>(\n<div class={styles.card}>Component ${num}</div>\n);`;

            Xkin.files.create(name, content);
            activeName = name;
            tsxEditor.setModel(Xkin.files.get(name));
            renderTabs();
        }

        function removeFile(name) {
            const entry = Xkin.files.list().find((f) => f.name === name);
            if (!entry || entry.main) return;

            Xkin.files.delete(name);
            const remaining = Xkin.files.list();

            if (remaining.length === 0) {
                activeName = "";
                renderTabs();
                return;
            }

            if (activeName === name) activeName = remaining[0].name;
            tsxEditor.setModel(Xkin.files.get(activeName));
            renderTabs();
        }

        /* Init editor */
        tsxEditor = Xkin.editor({
            element: document.getElementById("tsx-editor"),
            language: "typescript",
            value: ""
        });

        tsxEditor.setModel(Xkin.files.get(activeName));
        renderTabs();

        /* Build */

        document.getElementById("btn-build").addEventListener("click", async () => {

            const compress = document.getElementById("opt-compress").checked;
            const mangle = document.getElementById("opt-mangle").checked;

            const scssSource = scssEditor.getValue();
            const t0 = performance.now();

            /* CSS */
            let cssResult;
            try {
                cssResult = await Xkin.css_modules({
                    source: scssSource,
                    namespace: "app"
                });

                cssOutput.setValue(cssResult.css);
                tokensOutput.setValue(JSON.stringify(cssResult.tokens || {}, null, 2));

                showStatus("css-status",
                    `CSS: ${Object.keys(cssResult.tokens || {}).length} scoped in ${(performance.now() - t0).toFixed(1)}ms`
                );

            } catch (err) {
                cssOutput.setValue("");
                tokensOutput.setValue("");
                showStatus("css-status", err.message, true);
                return;
            }

            /* Merge via Xkin.files.merge() */
            const merged = Xkin.files.merge();
            const stylesDecl = "const styles=" + JSON.stringify(cssResult.tokens || {}) + ";";
            const fullSource = stylesDecl + "\n\n" + merged;

            const t1 = performance.now();

            /* TSX */
            let jsCode;
            try {
                const result = await Xkin.tsx({
                    source: fullSource,
                    compress,
                    mangle
                });

                jsCode = result.code;
                jsOutput.setValue(jsCode);

                showStatus("js-status",
                    `JS: ${fullSource.length}B -> ${jsCode.length}B in ${(performance.now() - t1).toFixed(1)}ms`
                );

            } catch (err) {
                jsOutput.setValue("");
                showStatus("js-status", err.message, true);
                return;
            }

        });

    </script>

</body>

</html>
